{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow border-0">

                <div class="card-body p-4">

                    <h2 class="fw-bold mb-4">
                        Rate Seller
                    </h2>

                    <h5 class="mb-4">

                        {{ seller.user.username }}

                    </h5>

                    <form method="POST">

                        {% csrf_token %}

                        <label class="form-label">
                            Rating
                        </label>

                        <select
                            name="stars"
                            class="form-select mb-3"
                            required
                        >

                            <option value="5">
                                ★★★★★ Excellent
                            </option>

                            <option value="4">
                                ★★★★ Very Good
                            </option>

                            <option value="3">
                                ★★★ Good
                            </option>

                            <option value="2">
                                ★★ Fair
                            </option>

                            <option value="1">
                                ★ Poor
                            </option>

                        </select>

                        <label class="form-label">
                            Review
                        </label>

                        <textarea
                            name="review"
                            rows="5"
                            class="form-control mb-4"
                            placeholder="Share your experience..."
                        ></textarea>

                        <button
                            class="btn btn-warning w-100"
                        >
                            Submit Review
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
