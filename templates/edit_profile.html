{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body p-5">

                    <h2 class="fw-bold mb-4">
                        Edit Seller Profile
                    </h2>

                    <form method="POST"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        <!-- PROFILE IMAGE -->

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Profile Picture
                            </label>

                            <input type="file"
                                   name="profile_image"
                                   class="form-control">

                        </div>

                        <!-- SKILLS -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Skills
                            </label>

                            <div class="d-flex gap-2">

                            <input
                                type="text"
                                id="skillInput"
                                class="form-control"
                                placeholder="Type a skill"
                            >

                            <button
                                type="button"
                                class="btn btn-dark"
                                onclick="focusAndAddSkill()"
                            >
                            +
                            </button>

                        </div>

                        <div
                            id="skillsList"
                            class="mt-3"
                         ></div>

                            <input
                                type="hidden"
                                name="skills"
                                id="skillsField"
                            >

                        </div>
                        

                        <!-- EDUCATION -->

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Education
                            </label>

                            <input type="text"
                                   name="education"
                                   class="form-control"
                                   value="{{ profile.education }}">

                        </div>

                        <!-- CERTIFICATION -->

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Skill Certification
                            </label>

                            <input type="text"
                                   name="certification"
                                   class="form-control"
                                   value="{{ profile.certification }}">

                        </div>

                        <!-- EXPERIENCE -->

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Experience (Years)
                            </label>

                            <input type="number"
                                   name="experience"
                                   class="form-control"
                                   value="{{ profile.experience }}">

                        </div>

                        <!-- PRICE -->

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Hourly Pricing
                            </label>

                            <input type="number"
                                   name="price"
                                   class="form-control"
                                   value="{{ profile.price }}">

                        </div>

                        <!-- BIO -->

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                About
                            </label>

                            <textarea name="bio"
                                      rows="5"
                                      class="form-control">{{ profile.bio }}</textarea>

                        </div>

                        <!-- WORK IMAGE -->

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Work Sample Image
                            </label>

                            <input type="file"
                                   name="work_image"
                                   class="form-control">

                        </div>

                        <!-- VIDEO -->

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Intro Video
                            </label>

                            <input type="file"
                                   name="intro_video"
                                   class="form-control">

                        </div>

                        <!-- BUTTON -->

                        <button class="btn btn-dark px-4 py-2">

                            Save Profile

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
<script>
    const allSkills = [

    "Plumbing",
    "Electrician",
    "AC Repair",
    "Painting",
    "Carpenter",
    "Gardening",

    "Photography",
    "Wedding Photography",
    "Portrait Photography",
    "Product Photography",

    "Video Editing",
    "Animation",

    "Logo Design",
    "UI UX Design",

    "Web Development",
    "Django Developer",
    "React Developer",
    "Full Stack Developer",

    "Machine Learning",
    "Data Science",

    "SEO",
    "Content Writing",

    "Fitness Trainer",
    "Yoga Trainer",
    "Dance Teacher"

];

/* EXISTING SKILLS */

let skills = [

            {% for skill in profile.skills.all %}
            "{{ skill.name }}",
            {% endfor %}

            ];

const skillInput = document.getElementById("skillInput");
const skillsList = document.getElementById("skillsList");
const skillsField = document.getElementById("skillsField");

/* AUTOCOMPLETE */

const suggestionBox = document.createElement("div");

suggestionBox.className =
    "list-group position-absolute w-100 shadow-sm";

suggestionBox.style.zIndex = "999";

skillInput.parentNode.appendChild(suggestionBox);

skillInput.addEventListener("input", function(){

    const value = this.value.toLowerCase();

    suggestionBox.innerHTML = "";

    if(value.length === 0){
        return;
    }

    const filtered = allSkills.filter(skill =>
        skill.toLowerCase().includes(value)
    );

    filtered.forEach(skill => {

        const item = document.createElement("button");

        item.type = "button";

        item.className =
            "list-group-item list-group-item-action";

        item.innerText = skill;

        item.onclick = function(){

            addSkill(skill);

            skillInput.value = "";

            suggestionBox.innerHTML = "";

        };

        suggestionBox.appendChild(item);

    });

});
function focusAndAddSkill(){

    skillInput.focus();

    if(skillInput.value.trim() !== ""){

        addSkill();

    }

}
/* ADD SKILL */

function addSkill(skillValue = null){

    let skill =
        skillValue || skillInput.value.trim();

    if(skill === ""){
        return;
    }

    if(skills.includes(skill)){
        return;
    }

    skills.push(skill);

    updateSkills();

    skillInput.value = "";

}

/* UPDATE TAGS */

function updateSkills(){

    skillsList.innerHTML = "";

    skills.forEach(skill => {

        const tag =
            document.createElement("span");

        tag.className =
            "badge bg-dark me-2 mb-2 p-2";

        tag.style.cursor = "pointer";

        tag.innerHTML =
            `${skill} ✕`;

        tag.onclick = function(){

            skills =
                skills.filter(s => s !== skill);

            updateSkills();

        };

        skillsList.appendChild(tag);

    });

    skillsField.value =
        skills.join(",");

}

/* LOAD EXISTING SKILLS */

document.addEventListener(
    "DOMContentLoaded",
    function(){

        updateSkills();

    }
);
</script>

{% endblock %}
