{% extends 'base.html' %}
{% block content %}

<div class="register-container">

    <div class="register-card">
        <h2>Create Account</h2>
        {% if error %}
        <div  class="alert alert-danger mb-3">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <select name="role" id="role" onchange="toggleSeller()">
                <option value="buyer">Buyer</option>
                <option value="seller">Seller</option>
            </select>

            <input type="text" name="username" placeholder="Username" required >
            <input type="email" name="email" placeholder="Email" required >
            <input type="password" name="password" placeholder="Password" required >
            <input type="password" name="confirm_password" placeholder="Confirm Password" required >
            <div id="seller-section" style="display:none;">

                <label>Skills</label>
                <div class="skill-box">
                    <input type="text" id="skillInput" placeholder="Type skill">
                    <button type="button" onclick="addSkill()">➕</button>
                    
                </div>

                <div id="skillsList"></div>
                <input type="hidden" name="skills" id="skillsField">

                <label>Resume</label>
                <input type="file" name="resume">

                <label>Portfolio</label>
                <input type="file" name="portfolio">
            </div>

            <button class="submit-btn">
                Register
            </button>

        </form>
    </div>

</div>
<script>

const allSkills = [

    "Plumbing",
    "Electrician",
    "AC Repair",
    "Painting",
    "Carpenter",
    "Gardening",
    "Home Cleaning",
    "Kitchen Cleaning",
    "Bathroom Cleaning",
    "Sofa Cleaning",
    "Pest Control",
    "WiFi Setup",
    "Furniture Assembly",

    "Photography",
    "Wedding Photography",
    "Portrait Photography",
    "Product Photography",
    "Photo Editing",

    "Video Editing",
    "Animation",
    "Thumbnail Design",

    "Logo Design",
    "UI UX Design",
    "Branding",
    "Illustration",

    "Web Development",
    "Django Developer",
    "React Developer",
    "Full Stack Developer",
    "WordPress",

    "Machine Learning",
    "Data Science",
    "AI Automation",
    "Chatbot Development",

    "SEO",
    "Social Media Marketing",
    "Content Writing",
    "Copywriting",

    "Article Writing",
    "Translation",
    "Proofreading",

    "Fitness Trainer",
    "Yoga Trainer",
    "Martial Arts Trainer",
    "Dance Teacher",
    "Drawing Teacher",
    "Chess Coach"

];

let skills = [];

function toggleSeller(){

    let role =
        document.getElementById("role").value;

    document.getElementById("seller-section").style.display =
        role === "seller"
        ? "block"
        : "none";

}

const skillInput =
    document.getElementById("skillInput");

const skillsList =
    document.getElementById("skillsList");

const skillsField =
    document.getElementById("skillsField");

/* AUTOCOMPLETE BOX */

const suggestionBox =
    document.createElement("div");

suggestionBox.className =
    "list-group position-absolute w-100 shadow-sm";

suggestionBox.style.zIndex = "999";

skillInput.parentNode.appendChild(suggestionBox);

/* SHOW MATCHING SKILLS */

skillInput.addEventListener("input", function(){

    const value =
        this.value.toLowerCase();

    suggestionBox.innerHTML = "";

    if(value.length === 0){
        return;
    }

    const filtered =
        allSkills.filter(skill =>
            skill.toLowerCase().includes(value)
        );

    filtered.forEach(skill => {

        const item =
            document.createElement("button");

        item.type = "button";

        item.className =
            "list-group-item list-group-item-action";

        item.innerText = skill;

        item.onclick = function(){

            addSkill(skill);

            suggestionBox.innerHTML = "";

            skillInput.value = "";

        };

        suggestionBox.appendChild(item);

    });

});

/* ADD SKILL */

function addSkill(skillValue = null){

    let skill =
        skillValue || skillInput.value.trim();

    if(skill === ""){
        return;
    }

    if(skills.includes(skill)){
        return;
    }

    skills.push(skill);

    updateSkills();

    skillInput.value = "";

}

/* UPDATE TAGS */

function updateSkills(){

    skillsList.innerHTML = "";

    skills.forEach(skill => {

        const tag =
            document.createElement("span");

        tag.className =
            "badge bg-dark me-2 mb-2 p-2";

        tag.style.cursor = "pointer";

        tag.innerHTML =
            `${skill} ✕`;

        tag.onclick = function(){

            skills =
                skills.filter(s => s !== skill);

            updateSkills();

        };

        skillsList.appendChild(tag);

    });

    skillsField.value =
        skills.join(",");

}

</script>

<style>

body{
    background:#f5f7fa;
}

/* CENTER CONTAINER */

.register-container{

    min-height:85vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:30px;
}


/* CARD */

.register-card{

    width:500px;

    background:white;

    padding:40px;

    border-radius:25px;

    box-shadow:0 5px 30px rgba(0,0,0,0.08);

}


/* TITLE */

.register-card h2{

    text-align:center;

    color:#0f172a;

    font-size:50px;

    font-weight:700;

    margin-bottom:30px;
}


/* INPUTS */

.register-card input,
.register-card select{

    width:100%;

    padding:14px;

    border:1px solid #d1d5db;

    border-radius:12px;

    margin-bottom:15px;

    outline:none;

}


.register-card input:focus,
.register-card select:focus{

    border:1px solid #1dbf73;
}


/* LABELS */

.register-card label{

    font-weight:600;

    margin-bottom:8px;

    display:block;

    color:#222;
}


/* SKILLS AREA */

.skill-box{

    display:flex;

    gap:10px;

    margin-bottom:15px;

    position:relative;

}

.skill-box button{

    background:#1dbf73;

    border:none;

    color:white;

    padding:12px 15px;

    border-radius:10px;

}

.skill-box button:hover{

    background:#18a566;

}


/* SKILL TAGS */

#skillsList span{

    border-radius:20px;

    padding:8px 14px;

    margin-right:8px;

    margin-bottom:8px;

}


/* BUTTON */

.submit-btn{

    width:100%;

    border:none;

    background:#1dbf73;

    color:white;

    padding:15px;

    border-radius:12px;

    font-size:18px;

    font-weight:bold;

    margin-top:20px;

}

.submit-btn:hover{

    background:#17a864;

}


/* AUTOCOMPLETE */

.list-group{

    max-height:200px;

    overflow-y:auto;

    border-radius:10px;

}

</style>
{% endblock %}
